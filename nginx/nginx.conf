user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Compresión gzip para assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               image/svg+xml;

    # ── HTTP (puerto 80) ──────────────────────────────────────────────
    # Sirve el reto ACME de Let's Encrypt y redirige todo lo demás a HTTPS.
    server {
        listen 80;
        server_name abastos.ukarosoft.com 161.35.142.183;

        # Reto de validación de Certbot (webroot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo el resto del tráfico se fuerza a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS (puerto 443) ────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name abastos.ukarosoft.com;

        ssl_certificate     /etc/letsencrypt/live/abastos.ukarosoft.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abastos.ukarosoft.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS — fuerza HTTPS en el navegador por 1 año
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Archivos estáticos — servidos directo por Nginx (más rápido que Gunicorn)
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Archivos de media
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # Aplicación Django via Gunicorn
        location / {
            proxy_pass http://web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
