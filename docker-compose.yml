services:
  db:
    image: postgres:16-alpine
    container_name: abastos_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - abastos_network

  web:
    build: .
    container_name: abastos_web
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - backup_volume:/app/backups
    depends_on:
      - db
    networks:
      - abastos_network
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn bodega_system.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  nginx:
    image: nginx:alpine
    container_name: abastos_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - abastos_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  backup_volume:

networks:
  abastos_network:
    driver: bridge
